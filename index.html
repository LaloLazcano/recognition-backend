 
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recognition Wall</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 16px;
      font-size: 22px;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    .user {
      font-weight: bold;
      font-size: 16px;
    }

    .reason {
      margin: 6px 0;
    }

    .date {
      font-size: 12px;
      color: gray;
    }

    .form {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #2ecc71;
    }
  </style>
</head>

<body>

<header>Recognition Wall 🚀</header>

<div class="container">

  <div class="form">
    <input id="user" placeholder="¿A quién reconoces?">
    <input id="reason" placeholder="¿Por qué lo reconoces?">
    <button onclick="addRecognition()">Reconocer</button>
  </div>

  <div id="wall"></div>

</div>

<script>
const API = "https://recognition-backend-lz5r.onrender.com/recognitions";
const API_KEY = "recognition123secure"; // ⚠️ CAMBIA ESTO

async function loadWall() {
  const res = await fetch(API, {
    headers: {
      "x-api-key": API_KEY
    }
  });

  const data = await res.json();

  const wall = document.getElementById("wall");
  wall.innerHTML = "";

  data.reverse().forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="user">⭐ ${item.recognizedUser}</div>
      <div class="reason">${item.reason}</div>
      <div class="date">${new Date(item.createdAt).toLocaleString()}</div>
    `;

    wall.appendChild(div);
  });
}

async function addRecognition() {
  const user = document.getElementById("user").value;
  const reason = document.getElementById("reason").value;

  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY
    },
    body: JSON.stringify({
      recognizedUser: user,
      recognizedBy: "usuario",
      reason: reason
    })
  });

  loadWall();
}

loadWall();
</script>

</body>
</html>
